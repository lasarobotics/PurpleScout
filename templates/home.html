{% extends "base.html" %}

{% block title %}ℙ𝕦𝕣𝕡𝕝𝕖 𝕊𝕔𝕠𝕦𝕥{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
{% endblock %}

{% block body %}

<div class="home-hero">
    <!-- Leaderboard Widget -->
    <div id="home_leaderboard" class="leaderboard-widget">
        <h3 class="leaderboard-title">🤑 Top 10 Richest Scouts</h3>
        <ol id="lb_list" class="leaderboard-list">
            <li class="leaderboard-empty">Loading...</li>
        </ol>
        <div class="leaderboard-footer">
            <a href="leaderboard.html" class="leaderboard-link">View Full Board ➔</a>
        </div>
    </div>

    <!-- The Cube -->
    <div class="hero-cube-wrap">
        <div class="cube">
            <div class="top"></div>
            <div>
                <span style="--i:0;"></span>
                <span style="--i:1;"></span>
                <span style="--i:2;"></span>
                <span style="--i:3;"></span>
            </div>
        </div>
    </div>

    <div class="hero-spacer" aria-hidden="true"></div>
</div>

<div class="txt" style="margin-top: 30px;">
    <bold>
        <p style="margin:60px;color:whitesmoke; font-weight:bolder; font-family:sans-serif" id="purpleScout">
            ℙ𝕦𝕣𝕡𝕝𝕖𝕊𝕔𝕠𝕦𝕥 - {{ name }}
        </p>
    </bold>
</div>


<dialog id="imageAlert">
  <img src="static/igbro.jpg" alt="Alert Image" width="100%" height="100%">
  <button type="button" onclick="document.getElementById('imageAlert').close()">Close</button>
</dialog>

<div class="but" style="margin-top:-30px;margin-bottom:-30px;">
  <a href="scout.html"><button class="button" type="button">Regular 🔎</button> </a>
  <a href="superScout.html"><button class="button" type="button">Super 🕵️</button> </a>
  <button onclick="document.getElementById('imageAlert').showModal()" class="button" id="not-clickable" type="button">Mega 🤓</button>
  <a href="pitScout.html"><button class="button" type="button">Pit 🛠️</button> </a>
  <a href="visualize.html"><button class="button" type="button">Visualize 📊</button> </a>
  <a href="trends.html"><button class="button" type="button">Trends 📈</button> </a>
</div>
  
<!-- <div class="footer">
    <p><b>Courtesy of LASA Robotics, Software Developed by Soumik Chemudupati</b></p>
</div> -->
<script src="static/jquery.min.js"></script>
<script>
    $(document).ready(function() {
        $.getJSON('/api/leaderboard', function(data) {
            let list = $('#lb_list');
            list.empty();
            if (data.length === 0) {
                list.append('<li class="leaderboard-empty">No scores available yet!</li>');
            } else {
                let top10 = data.slice(0, 10);
                top10.forEach((item, index) => {
                    let rankClass = '';
                    if (index === 0) rankClass = 'first';
                    else if (index === 1) rankClass = 'second';
                    else if (index === 2) rankClass = 'third';

                    const scoutName = (item.scoutID || 'Unknown').toString().substring(0, 12);
                    list.append(
                        `<li class="leaderboard-item ${rankClass}"><span class="leaderboard-name">${scoutName}</span><span class="leaderboard-balance">${item.balance}</span></li>`
                    );
                });
            }
        });
    });
</script>
{% endblock %}
