{% extends "base.html" %}

{% block title %}ℙ𝕦𝕣𝕡𝕝𝕖 𝕊𝕔𝕠𝕦𝕥 - Leaderboard{% endblock %}

{% block head %}
<link rel="stylesheet" href="static/home.css">
<style>
    .lb-table {
        margin: 50px auto;
        border-collapse: collapse;
        width: 80%;
        max-width: 600px;
        background-color: rgba(20, 20, 20, 0.8);
        border-radius: 10px;
        overflow: hidden;
        color: white;
        font-family: monospace;
        font-size: 18px;
    }
    .lb-table th {
        background-color: rgba(102, 51, 153, 0.8);
        padding: 15px;
        font-size: 20px;
    }
    .lb-table td {
        padding: 12px 15px;
        border-bottom: 1px solid #444;
    }
    .lb-table tr:hover {
        background-color: rgba(102, 51, 153, 0.4);
    }
</style>
{% endblock %}

{% block body %}
<div style="text-align: center; margin-top: 30px;">
    <h1 style="color: white; margin-bottom: 15px;">🏆 PH Bucks Leaderboard 🏆</h1>
    <a href="/" style="color: #a170ff; text-decoration: none; font-size: 18px; font-weight: bold;">⬅ Back to Home</a>
</div>

<table class="lb-table">
    <thead>
        <tr>
            <th style="width: 15%;">Rank</th>
            <th style="text-align: left;">Scout ID</th>
            <th style="text-align: right;">PH Bucks</th>
        </tr>
    </thead>
    <tbody id="full_lb_body">
        <tr><td colspan="3" style="text-align: center;">Loading data...</td></tr>
    </tbody>
</table>

<script src="static/jquery.min.js"></script>
<script>
    $(document).ready(function() {
        $.getJSON('/api/leaderboard', function(data) {
            let list = $('#full_lb_body');
            list.empty();
            if (data.length === 0) {
                list.append('<tr><td colspan="3" style="text-align: center;">No scouts found!</td></tr>');
            } else {
                data.forEach((item, index) => {
                    let rankStr = (index + 1);
                    if (index === 0) rankStr = '🥇 1';
                    else if (index === 1) rankStr = '🥈 2';
                    else if (index === 2) rankStr = '🥉 3';

                    list.append(`
                        <tr>
                            <td style="text-align: center; font-weight: bold;">${rankStr}</td>
                            <td>${item.scoutID}</td>
                            <td style="text-align: right;">${item.balance}</td>
                        </tr>
                    `);
                });
            }
        });
    });
</script>
{% endblock %}
